<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Forms</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            position: relative;
            background: transparent;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }

        #mainCanvas { z-index: 1; }
        #systemCanvas { z-index: 2; pointer-events: none; }
        #interactionCanvas { z-index: 3; pointer-events: none; }
        #debugCanvas { z-index: 4; pointer-events: none; }
        #hitCanvas { display: none; }
    </style>
</head>
<body>
    <!-- Main scene rendering layer -->
    <canvas id="mainCanvas"></canvas>
    
    <!-- Hit testing layer (invisible, for pointer events) -->
    <canvas id="hitCanvas" style="display: none;"></canvas>
    
    <!-- System UI layer (popups, toasts, dropdowns) -->
    <canvas id="systemCanvas"></canvas>
    
    <!-- Interaction feedback layer (hover, drag states, cursor) -->
    <canvas id="interactionCanvas"></canvas>
    
    <!-- Debug overlay layer (performance metrics, debug info) -->
    <canvas id="debugCanvas"></canvas>
   
    <script type="module" src="/src/index.js"></script>
    
</body>
</html>
